# Docker Compose для VPS (PostgreSQL и Redis запущены в этом же проекте или как orphan-контейнеры)
version: '3.8'

networks:
  # Подключаемся к существующей Docker-сети проекта
  minitms-network:
    external: true
    name: minitms_minitms-network

services:
  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minitms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - minitms-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend (React + Vite, nginx proxy → backend:8000)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minitms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - minitms-network
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
