# docker-compose.prod.yml — Микросервисное развёртывание MiniTMS (Подход C)
# 10 контейнеров: postgres, redis, gateway, core-api, cargo-engine,
#                 scraping-worker, integration-hub, celery-worker, celery-beat, frontend
# Запуск: docker compose -f docker-compose.prod.yml up -d

services:

  # ── Инфраструктура ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    container_name: minitms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: mini-tms
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minitms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: minitms-redis
    restart: unless-stopped
    # Redis с паролем — защита от несанкционированного доступа
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minitms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API Gateway (nginx) ────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: minitms-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - core-api
      - cargo-engine
      - scraping-worker
      - integration-hub
    networks:
      - minitms-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Микросервисы (лёгкие, без Playwright) ─────────────────────────────────

  core-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: minitms-core-api
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./alembic.ini:/workspace/alembic.ini:ro
    entrypoint: [ "/bin/bash", "entrypoint_core.sh" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cargo-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: minitms-cargo-engine
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SERVICE_MODULE: backend.main_.main_cargo:app
      SERVICE_PORT: "8002"
    entrypoint: [ "/bin/bash", "entrypoint_service.sh" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8002/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  scraping-worker:
    build:
      context: ./backend
      # Полный Dockerfile с Playwright + Xvfb + noVNC
      dockerfile: Dockerfile
    container_name: minitms-scraping-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SERVICE_MODULE: backend.main_.main_scraping:app
      SERVICE_PORT: "8003"
    entrypoint: [ "/bin/bash", "entrypoint_scraping.sh" ]
    ports:
      # noVNC (доступ к браузеру через веб-интерфейс)
      - "6080:6080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8003/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  integration-hub:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: minitms-integration-hub
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SERVICE_MODULE: backend.main_.main_integration:app
      SERVICE_PORT: "8004"
    entrypoint: [ "/bin/bash", "entrypoint_service.sh" ]
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8004/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Celery (фоновые задачи) ────────────────────────────────────────────────

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: minitms-celery-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      celery -A backend.src.infrastructure.messaging.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.service
    container_name: minitms-celery-beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: >
      celery -A backend.src.infrastructure.messaging.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - minitms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend ───────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minitms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - minitms-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Хранилища данных ───────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Сеть ────────────────────────────────────────────────────────────────────

networks:
  minitms-network:
    driver: bridge
