worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # DNS-резолвер Docker (обязателен для runtime-proxy внутри сети)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Таймауты
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    120s;

    # Заголовки для проксирования
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 8000;
        server_name _;

        # ── Health-check самого gateway ─────────────────────────────
        location = /health {
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Core API (auth, users, fleet, vehicles) ─────────────────
        location ~ ^/api/v1/(auth|users|fleet|vehicles)(/|$) {
            set $upstream http://core-api:8001;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Cargo Engine (cargos, routes, route-planning) ───────────
        location ~ ^/api/v1/(cargos|routes|route-planning)(/|$) {
            set $upstream http://cargo-engine:8002;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Scraping Worker ─────────────────────────────────────────
        location ~ ^/api/v1/scraping(/|$) {
            set $upstream http://scraping-worker:8003;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Скрапинг может выполняться долго
            proxy_read_timeout 300s;
        }

        # ── Integration Hub (gps, email, financial, google-sheets, settings) ──
        location ~ ^/api/v1/(gps|email|financial|google-sheets|settings)(/|$) {
            set $upstream http://integration-hub:8004;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── FastAPI Swagger UI ──────────────────────────────────────
        location /docs {
            set $upstream http://core-api:8001;
            proxy_pass $upstream/docs;
        }
        
        location /openapi.json {
            set $upstream http://core-api:8001;
            proxy_pass $upstream/openapi.json;
        }

        # ── Fallback — 404 для неизвестных маршрутов ────────────────
        location / {
            return 404 '{"error":"route not found"}';
            add_header Content-Type application/json;
        }
    }
}
